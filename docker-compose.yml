services:
  seo-tools:
    image: ghcr.io/3h4x/seo-tools:latest
    container_name: seo-tools
    # user: "0"  # uncomment on Synology NAS (ACL on volumes blocks uid 1001)
    restart: unless-stopped
    ports:
      - "3031:3031"
    volumes:
      - ./data:/app/data
    environment:
      # Optional — if omitted, paste the key in the Config tab after first boot
      - GOOGLE_SA_KEY_JSON=${GOOGLE_SA_KEY_JSON:-}
    labels:
      - com.centurylinklabs.watchtower.scope=seo-tools

  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: seo-tools-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCOPE=seo-tools
      - WATCHTOWER_LABEL_ENABLE=true
